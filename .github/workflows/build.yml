name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest ]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ClassicAssist.sln

      - name: Build net10 plugin (Release)
        run: dotnet build ClassicAssist/ClassicAssist.csproj -c Release --no-restore

      - name: Build PluginLoader (net48)
        run: dotnet build ClassicAssist.PluginLoader/PluginLoader.csproj -c Release --no-restore

      - name: Build TestHost (Release)
        run: dotnet build TestHost/TestHost.csproj -c Release --no-restore

      # The .Tests / .Launcher / .Updater projects target net10.0-windows and
      # only build on the Windows runner.
      - name: Build Windows-only projects
        if: runner.os == 'Windows'
        run: |
          dotnet build ClassicAssist.Tests/ClassicAssist.Tests.csproj -c Release --no-restore
          dotnet build ClassicAssist.Launcher/ClassicAssist.Launcher.csproj -c Release --no-restore
          dotnet build ClassicAssist.Updater/ClassicAssist.Updater.csproj -c Release --no-restore
