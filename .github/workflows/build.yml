name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest ]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Restore the cross-platform projects we build on every runner. The
      # whole .sln pulls in net10.0-windows projects (Launcher, Updater,
      # Tests, SyncPOEditor) that fail restore on Linux without the Windows
      # targeting pack, so we restore each project explicitly instead.
      - name: Restore net10 cross-platform projects
        run: |
          dotnet restore ClassicAssist/ClassicAssist.csproj
          dotnet restore TestHost/TestHost.csproj

      - name: Build net10 plugin (Release)
        run: dotnet build ClassicAssist/ClassicAssist.csproj -c Release --no-restore

      - name: Build TestHost (Release)
        run: dotnet build TestHost/TestHost.csproj -c Release --no-restore

      # PluginLoader targets net48. The DLL is binary-identical regardless of
      # build OS, so only build it on the Windows runner (Linux runners don't
      # have .NET Framework reference assemblies by default).
      - name: Build PluginLoader (net48)
        if: runner.os == 'Windows'
        run: dotnet build ClassicAssist.PluginLoader/PluginLoader.csproj -c Release

      # The .Tests / .Launcher / .Updater projects target net10.0-windows and
      # only build on the Windows runner.
      - name: Build Windows-only projects
        if: runner.os == 'Windows'
        run: |
          dotnet build ClassicAssist.Tests/ClassicAssist.Tests.csproj -c Release
          dotnet build ClassicAssist.Launcher/ClassicAssist.Launcher.csproj -c Release
          dotnet build ClassicAssist.Updater/ClassicAssist.Updater.csproj -c Release
